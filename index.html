<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2>LOGIN</h2>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">LOGIN</button>

<p>No account? <a href="register.html" style="color:#00ffcc">Register</a></p>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const ADMIN = "jhonlouiebaid92@gmail.com";

window.login = async ()=>{
  try{
    const res = await signInWithEmailAndPassword(auth,email.value,pass.value);
    if(res.user.email === ADMIN){
      location="admin.html";
    }else{
      location="dashboard.html";
    }
  }catch(e){
    alert("Login error ❌");
  }
};
</script>

</body>
</html>
