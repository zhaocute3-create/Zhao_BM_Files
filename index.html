<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body { background:#0b1220; color:white; text-align:center; font-family:sans-serif; padding-top:50px;}
.box { background:#111827; padding:25px; display:inline-block; border-radius:12px;}
input,button { padding:12px; margin:8px; border-radius:8px; border:none;}
button { background:#00ffcc; cursor:pointer;}
#msg { margin-top:10px; font-weight:bold;}
</style>
</head>
<body>

<div class="box">
<h2>Login / Register</h2>

<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
