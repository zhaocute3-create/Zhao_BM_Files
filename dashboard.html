<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{background:#0b1220;color:white;text-align:center;font-family:sans-serif;}
.box{background:#111827;margin:10px;padding:15px;border-radius:10px;}
button,input{padding:10px;margin:5px;border-radius:8px;border:none;}
button{background:#00ffcc;}
#deposit{display:none;background:#000c;position:fixed;top:0;width:100%;height:100%;}
</style>
</head>
<body>

<div class="box">
<p>UID: <span id="uid">...</span></p>
<p>Balance: <span id="bal">0</span></p>
</div>

<div class="box">
<button onclick="openDep()">Deposit</button>
</div>

<div id="deposit">
<div class="box">
<h3>Deposit</h3>
<input id="amount" placeholder="Amount"><br>
<input id="refInput" placeholder="Reference"><br>
<input type="file" id="file"><br>
<button onclick="sendDep()">Submit</button>
<button onclick="deposit.style.display='none'">Close</button>
</div>
</div>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, addDoc, collection }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey:"AIzaSyAyxbJtIGOfiU5_h8BRKsXyK4RC_wIET3s",
  authDomain:"zhaobmfiles.firebaseapp.com",
  projectId:"zhaobmfiles",
  storageBucket:"zhaobmfiles.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let user;

// LOAD USER
onAuthStateChanged(auth, async u=>{
  if(!u){ location="index.html"; return;}
  user=u;

  const snap=await getDoc(doc(db,"users",u.uid));
  if(snap.exists()){
    uid.innerText=snap.data().uidNum;
    bal.innerText=snap.data().balance;
  }
});

window.openDep=()=>deposit.style.display="block";

// SEND DEPOSIT
window.sendDep=async()=>{
  msg.innerText="Submitting...";

  const fileRef=ref(storage,"receipts/"+Date.now());
  await uploadBytes(fileRef,file.files[0]);
  const url=await getDownloadURL(fileRef);

  await addDoc(collection(db,"deposits"),{
    userId:user.uid,
    amount:Number(amount.value),
    reference:refInput.value,
    receipt:url,
    status:"pending"
  });

  msg.innerText="✅ Submitted";
  deposit.style.display="none";
};
</script>
</body>
</html>
