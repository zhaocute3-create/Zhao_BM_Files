<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { background:#0b1220; color:white; text-align:center; }
button { padding:10px; margin:5px; border-radius:8px; }
</style>
</head>
<body>

<h2>Dashboard</h2>

<p>UID: <span id="uid"></span></p>
<p>Balance: <span id="bal">0</span></p>

<select id="game">
<option>MLBB</option>
<option>CODM</option>
<option>Roblox</option>
</select><br>

<button onclick="generate()">🎮 Generate Account</button>
<button onclick="showDeposit()">💳 Deposit</button>

<div id="depositBox" style="display:none;">
  <input id="amount" placeholder="Amount"><br>
  <input id="ref" placeholder="Reference"><br>
  <input type="file" id="file"><br>
  <button onclick="submitDeposit()">Submit</button>
</div>

<p id="msg"></p>

<script type="module" src="app.js"></script>
</body>
</html>
