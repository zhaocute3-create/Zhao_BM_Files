<!DOCTYPE html>
<html>
<head>
<title>Neo Wallet V3</title>
<style>
body {background:#0b1220;color:white;text-align:center;font-family:sans-serif;}
.card {background:rgba(255,255,255,0.05);padding:20px;margin:15px;border-radius:15px;box-shadow:0 0 20px #00ffcc33;}
button {padding:12px;margin:8px;border:none;border-radius:10px;background:#00ffcc;cursor:pointer;}
select,input {padding:10px;margin:5px;border-radius:8px;border:none;}
#modal {display:none;position:fixed;top:0;width:100%;height:100%;background:#000c;}
#toast {position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#00ffcc;color:black;padding:10px;border-radius:10px;display:none;}
</style>
</head>
<body>

<div class="card">
<h1>UID: <span id="uid"></span></h1>
<h2>₱ <span id="bal"></span></h2>
</div>

<div class="card">
<select id="game">
<option value="MLBB">MLBB (₱10)</option>
<option value="CODM">CODM (₱15)</option>
<option value="Roblox">Roblox (₱20)</option>
</select>
<button onclick="generate()">🎮 Generate</button>
</div>

<div class="card">
<button onclick="openDep()">💳 Deposit</button>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

<div id="modal">
<div class="card">
<h3>Deposit</h3>
<input id="amount" placeholder="Amount"><br>
<input id="refInput" placeholder="Reference"><br>
<input type="file" id="file"><br>
<button onclick="sendDep()">Submit</button>
<button onclick="modal.style.display='none'">Close</button>
</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
 apiKey:"AIzaSyAyxbJtIGOfiU5_h8BRKsXyK4RC_wIET3s",
 authDomain:"zhaobmfiles.firebaseapp.com",
 projectId:"zhaobmfiles",
 storageBucket:"zhaobmfiles.firebasestorage.app"
});

const auth=getAuth(app);
const db=getFirestore(app);
const storage=getStorage(app);

let user;

function toast(t){
 toastDiv.innerText=t;
 toastDiv.style.display="block";
 setTimeout(()=>toastDiv.style.display="none",2000);
}

// LOAD USER
onAuthStateChanged(auth, async u=>{
 if(!u){location="index.html";return;}
 user=u;

 const snap=await getDoc(doc(db,"users",u.uid));
 uid.innerText=snap.data().uidNum;
 bal.innerText=snap.data().balance;

 loadHistory();
});

// HISTORY
async function loadHistory(){
 const dep=await getDocs(collection(db,"deposits"));
 const gen=await getDocs(collection(db,"generated"));

 let h="";

 dep.forEach(d=>{
  const x=d.data();
  if(x.userId===user.uid){
    h+=`<p>💳 ₱${x.amount} - ${x.status}</p>`;
  }
 });

 gen.forEach(d=>{
  const x=d.data();
  if(x.userId===user.uid){
    h+=`<p>🎮 ${x.game} - ${x.account}</p>`;
  }
 });

 history.innerHTML=h;
}

// DEPOSIT
window.openDep=()=>modal.style.display="block";

window.sendDep=async()=>{
 const r=ref(storage,"receipts/"+Date.now());
 await uploadBytes(r,file.files[0]);
 const url=await getDownloadURL(r);

 await addDoc(collection(db,"deposits"),{
   userId:user.uid,
   amount:Number(amount.value),
   ref:refInput.value,
   receipt:url,
   status:"pending"
 });

 toast("Submitted!");
 modal.style.display="none";
};

// GENERATE (REAL STOCK)
window.generate = async()=>{
 const prices={MLBB:10,CODM:15,Roblox:20};
 const gameType=game.value;
 const price=prices[gameType];

 const userRef=doc(db,"users",user.uid);
 const snap=await getDoc(userRef);
 let balance=snap.data().balance;

 if(balance < price){
   toast("Not enough balance");
   return;
 }

 // GET STOCK
 const stock=await getDocs(collection(db,"stocks"));
 let found=null;

 stock.forEach(d=>{
  const x=d.data();
  if(x.game===gameType && !x.used){
    found={id:d.id,...x};
  }
 });

 if(!found){
   toast("No stock available");
   return;
 }

 // MARK USED
 await updateDoc(doc(db,"stocks",found.id),{used:true});

 // DEDUCT BALANCE
 await updateDoc(userRef,{balance:balance - price});

 // SAVE GENERATED
 await addDoc(collection(db,"generated"),{
  userId:user.uid,
  game:gameType,
  account:found.account
 });

 toast("Account: "+found.account);
 loadHistory();
};
</script>
</body>
</html>
