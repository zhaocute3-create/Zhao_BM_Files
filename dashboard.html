<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2>USER DASHBOARD</h2>
<p>💰 Balance: <span id="bal">0</span></p>

<a href="shop.html" style="color:#00ffcc">GO SHOP</a><br><br>

<button onclick="openDeposit()">💳 DEPOSIT</button>

<!-- DEPOSIT BOX -->
<div id="depBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000c;padding-top:50px">
<h3>GCash</h3>
<p>09753048649</p>
<p>L. B.</p>

<input id="amount" placeholder="Amount"><br>
<input id="ref" placeholder="Reference"><br>
<input type="file"><br>

<p id="timer">10:00</p>

<button onclick="submitDep()">Submit</button>
<button onclick="closeDep()">Cancel</button>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
  doc,getDoc,setDoc,updateDoc,addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser;
const bal = document.getElementById("bal");

auth.onAuthStateChanged(async user=>{
  if(!user) location="index.html";
  currentUser = user;

  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{balance:0});
  }

  setInterval(async ()=>{
    const s = await getDoc(ref);
    bal.innerText = s.data().balance || 0;
  },1000);
});

// deposit UI
let t;
window.openDeposit=()=>{
  document.getElementById("depBox").style.display="block";
  let time=600;
  t=setInterval(()=>{
    time--;
    let m=Math.floor(time/60);
    let s=time%60;
    timer.innerText=`${m}:${s<10?"0"+s:s}`;
    if(time<=0){clearInterval(t);alert("Expired");closeDep();}
  },1000);
};
window.closeDep=()=>{depBox.style.display="none";clearInterval(t);};

window.submitDep=async()=>{
  await addDoc(collection(db,"deposits"),{
    user:currentUser.email,
    amount:Number(amount.value),
    ref:ref.value,
    status:"pending"
  });
  alert("Submitted");
  closeDep();
};
</script>

</body>
</html>
