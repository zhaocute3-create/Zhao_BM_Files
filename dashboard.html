<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center;font-family:sans-serif">

<h2>Dashboard</h2>

<div style="border:1px solid #00ffcc;padding:10px;border-radius:10px">
<p>UID: <span id="uid"></span></p>
<p>Balance: <span id="bal"></span></p>
</div>

<br>

<button onclick="openDep()" style="background:#00ffcc;padding:10px;border-radius:10px">💳 Deposit</button>

<div id="box" style="display:none;position:fixed;top:0;width:100%;height:100%;background:#000c;padding-top:50px">

<h3>GCash</h3>
<p>09753048649</p>

<input id="amount" placeholder="Amount"><br><br>
<input id="ref" placeholder="Reference"><br><br>
<input type="file" id="file"><br><br>

<p id="timer">10:00</p>

<button onclick="submitDep()">Submit</button>
<button onclick="closeDep()">Cancel</button>

</div>

<script type="module">
import { auth, db, storage } from "./firebase.js";
import {
 doc,onSnapshot,addDoc,collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
 ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

let user;

auth.onAuthStateChanged(u=>{
  user=u;

  const refDoc = doc(db,"users",u.uid);

  onSnapshot(refDoc,s=>{
    uid.innerText=s.data().uidNumber;
    bal.innerText=s.data().balance;
  });
});

let t,time;

window.openDep=()=>{
  box.style.display="block";
  time=600;

  t=setInterval(()=>{
    time--;
    let m=Math.floor(time/60);
    let s=time%60;
    timer.innerText=`${m}:${s<10?"0"+s:s}`;
    if(time<=0){clearInterval(t);closeDep();}
  },1000);
};

window.closeDep=()=>{
  box.style.display="none";
  clearInterval(t);
};

window.submitDep=async()=>{
  const f=file.files[0];

  const storageRef = ref(storage,"receipts/"+Date.now());
  await uploadBytes(storageRef,f);

  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db,"deposits"),{
    user:user.uid,
    amount:Number(amount.value),
    ref:ref.value,
    receipt:url,
    status:"pending",
    time:Date.now()
  });

  alert("Submitted");
  closeDep();
};
</script>

</body>
</html>
