<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2>SHOP</h2>

<input id="keyInput" placeholder="Enter key">
<button onclick="useKey()">USE KEY</button>

<p>Balance: <span id="bal">0</span></p>

<button onclick="generate()">GENERATE</button>

<div id="res"></div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
 doc,getDoc,updateDoc,getDocs,collection,deleteDoc,addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser;

auth.onAuthStateChanged(user=>{
  currentUser=user;
});

// USE KEY
window.useKey=async()=>{
  const key=keyInput.value.trim();
  const snap=await getDocs(collection(db,"key"));

  let found=null;
  snap.forEach(d=>{
    if(d.data().key===key) found={id:d.id,...d.data()};
  });

  if(!found) return alert("Invalid");

  const ref=doc(db,"users",currentUser.uid);
  const s=await getDoc(ref);
  let bal=s.data().balance||0;

  await updateDoc(ref,{balance:bal+found.coins});
  await deleteDoc(doc(db,"key",found.id));

  alert("Added coins");
};

// GENERATE
window.generate=async()=>{
  const snap=await getDocs(collection(db,"accounts"));
  let acc=null;

  snap.forEach(d=>{if(!acc) acc={id:d.id,...d.data()};});

  if(!acc) return alert("No stock");

  await deleteDoc(doc(db,"accounts",acc.id));

  res.innerHTML=`${acc.username} | ${acc.password}`;
};
</script>

</body>
</html>
