<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h1>🎮 GENERATOR</h1>

<select id="game">
  <option>MLBB</option>
  <option>CODM</option>
  <option>ROBLOX</option>
</select>

<br><br>

<input id="keyInput" placeholder="Enter Key"><br><br>

<button onclick="useKey()">USE KEY</button><br><br>
<button onclick="generate()">GENERATE ACCOUNT</button>

<h3>💰 Balance: <span id="bal">0</span></h3>

<div id="result"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
 doc, getDoc, setDoc, updateDoc,
 collection, getDocs, deleteDoc,
 addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser;

auth.onAuthStateChanged(async user=>{
  if(!user) location="index.html";
  currentUser = user;

  // ✅ FIXED USER CREATE
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      email:user.email,
      balance:0
    });
  }

  // LIVE BALANCE
  setInterval(async ()=>{
    const s = await getDoc(ref);
    bal.innerText = s.data().balance || 0;
  },1000);
});

// ✅ USE KEY FIXED
window.useKey = async function() {
  const keyInput = document.getElementById("keyInput").value.trim();

  if (!keyInput) {
    alert("Enter key muna");
    return;
  }

  const user = firebase.auth().currentUser;
  if (!user) {
    alert("Login muna");
    return;
  }

  try {
    const snapshot = await db.collection("keys")
      .where("key", "==", keyInput)
      .get();

    if (snapshot.empty) {
      alert("Invalid key ❌");
      return;
    }

    let doc = snapshot.docs[0];
    let data = doc.data();

    const coins = data.coins || 0;

    const userRef = db.collection("users").doc(user.uid);
    const userDoc = await userRef.get();

    let currentBalance = 0;
    if (userDoc.exists) {
      currentBalance = userDoc.data().balance || 0;
    }

    await userRef.set({
      balance: currentBalance + coins,
      email: user.email
    }, { merge: true });

    await db.collection("keys").doc(doc.id).delete();

    alert("Success! +" + coins + " coins 💰");

    document.getElementById("balance").innerText = currentBalance + coins;

  } catch (error) {
    console.error(error);
    alert("Error sa key ❌");
  }
};

// ✅ GENERATE ACCOUNT
window.generate = async ()=>{
  const userRef = doc(db,"users",currentUser.uid);
  const userSnap = await getDoc(userRef);

  let balance = userSnap.data().balance || 0;

  if(balance <= 0){
    alert("No balance!");
    return;
  }

  const gameVal = game.value;

  const accSnap = await getDocs(collection(db,"accounts"));

  let selected=null;

  accSnap.forEach(d=>{
    let a=d.data();
    if(a.game===gameVal && !selected){
      selected={id:d.id,...a};
    }
  });

  if(!selected) return alert("No stock!");

  await updateDoc(userRef,{
    balance: balance - 1
  });

  await deleteDoc(doc(db,"accounts",selected.id));

  await addDoc(collection(db,"logs"),{
    user:currentUser.email,
    game:selected.game,
    account:selected.username+" | "+selected.password,
    time:Date.now()
  });

  result.innerHTML = `
  <h3>ACCOUNT:</h3>
  ${selected.username} | ${selected.password}
  `;
};
</script>

</body>
</html>
