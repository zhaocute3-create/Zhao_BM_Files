<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center;font-family:sans-serif">

<h2>🎮 GENERATOR</h2>

<select id="game">
  <option>MLBB</option>
  <option>CODM</option>
  <option>Roblox</option>
</select>

<br><br>

<!-- 🔑 KEY INPUT -->
<input id="userKey" placeholder="Enter Key" style="
padding:10px;
border-radius:10px;
border:none;
margin-bottom:10px;
"><br>

<button onclick="useKey()" style="
background:#00ffcc;
padding:10px 20px;
border:none;
border-radius:10px;
box-shadow:0 0 10px #00ffcc;
margin-bottom:15px;
">
USE KEY
</button>

<br>

<button onclick="generate()" style="
background:#00ff88;
padding:10px 20px;
border:none;
border-radius:10px;
box-shadow:0 0 10px #00ff88;
">
GENERATE ACCOUNT
</button>

<h3 id="balance">💰 Balance: 0</h3>

<div id="result"></div>

<script type="module">
import { db, auth } from "./firebase.js";

import {
 collection, getDocs, doc, updateDoc, addDoc, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser = null;

auth.onAuthStateChanged(async user=>{
  if(!user) return location="index.html";
  currentUser = user;

  // LOAD BALANCE
  let uRef = doc(db,"users",user.uid);
  let snap = await getDoc(uRef);

  if(!snap.exists()){
    await addDoc(collection(db,"users"),{
      uid:user.uid,
      email:user.email,
      balance:0
    });
  } else {
    balance.innerText = "💰 Balance: " + snap.data().balance;
  }
});

// 🔑 USE KEY SYSTEM
window.useKey = async()=>{
  let keyVal = userKey.value.trim();

  if(!keyVal) return alert("Enter key!");

  let keysSnap = await getDocs(collection(db,"keys"));
  let found = null;

  keysSnap.forEach(d=>{
    let k = d.data();

    // 🔥 EXACT MATCH FIX
    if(k.key === keyVal){
      found = {id:d.id, ...k};
    }
  });

  if(!found){
    return alert("❌ Invalid or already used key!");
  }

  let userRef = doc(db,"users",currentUser.uid);
  let uSnap = await getDoc(userRef);

  if(!uSnap.exists()){
    return alert("User data not found!");
  }

  let currentBal = uSnap.data().balance || 0;
  let newBal = currentBal + (found.coins || 0);

  // ✅ UPDATE BALANCE
  await updateDoc(userRef,{
    balance:newBal
  });

  // ✅ DELETE KEY (para di ma reuse)
  await deleteDoc(doc(db,"keys",found.id));

  alert("✅ Key accepted! +" + found.coins + " coins");

  balance.innerText = "💰 Balance: " + newBal;
  userKey.value="";
};

// 🎮 GENERATE
window.generate = async()=>{
  let user = currentUser;
  if(!user) return alert("Login muna");

  let userRef = doc(db,"users",user.uid);
  let uSnap = await getDoc(userRef);

  let balanceVal = uSnap.data().balance || 0;

  if(balanceVal <= 0) return alert("No balance!");

  let gameName = game.value;

  let accSnap = await getDocs(collection(db,"accounts"));
  let chosen = null;

  accSnap.forEach(d=>{
    let s = d.data();
    if(s.game===gameName && s.status==="available" && !chosen){
      chosen = {id:d.id, ...s};
    }
  });

  if(!chosen) return alert("No stock!");

  // DEDUCT BALANCE
  await updateDoc(userRef,{
    balance:balanceVal - 1
  });

  // MARK SOLD
  await updateDoc(doc(db,"accounts",chosen.id),{
    status:"sold"
  });

  // LOG
  await addDoc(collection(db,"logs"),{
    user:user.email,
    game:gameName,
    account:chosen.username,
    time:Date.now()
  });

  balance.innerText = "💰 Balance: " + (balanceVal - 1);

  result.innerHTML = `
  <div style="
  border:1px solid #00ff88;
  padding:15px;
  margin:15px;
  border-radius:10px;
  box-shadow:0 0 10px #00ff88;
  ">
    <h3>${gameName}</h3>
    USER: ${chosen.username}<br>
    PASS: ${chosen.password}
  </div>`;
};
</script>

</body>
</html>
