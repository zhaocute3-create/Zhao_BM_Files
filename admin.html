<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2>ADMIN</h2>

<input id="coins" placeholder="Coins">
<button onclick="createKey()">CREATE KEY</button>

<br><br>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<button onclick="addAcc()">ADD ACCOUNT</button>

<script type="module">
import { db, auth } from "./firebase.js";
import {
 collection,addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ADMIN="YOUR_EMAIL@gmail.com";

auth.onAuthStateChanged(user=>{
  if(!user || user.email!==ADMIN){
    alert("Not admin");
    location="index.html";
  }
});

window.createKey=async()=>{
  const key=Math.random().toString(36).substring(2,10);
  await addDoc(collection(db,"key"),{
    key:key,
    coins:Number(coins.value)
  });
  alert(key);
};

window.addAcc=async()=>{
  await addDoc(collection(db,"accounts"),{
    username:user.value,
    password:pass.value
  });
  alert("Added");
};
</script>

</body>
</html>
